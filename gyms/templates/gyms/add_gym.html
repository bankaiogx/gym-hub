{% extends 'base.html' %}

{% block title %}Add Gym - Gym Hub UK{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-lg-5">
                <div class="mb-4">
                    <p class="text-uppercase text-primary fw-semibold small mb-2">Create Listing</p>
                    <h1 class="mb-1">Add a New Gym</h1>
                    <p class="text-secondary mb-0">Share a gym with the community by filling in the details below.</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary">Add Gym</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

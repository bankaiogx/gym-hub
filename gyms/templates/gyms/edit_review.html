{% extends 'base.html' %}

{% block title %}Edit Review - Gym Hub UK{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-lg-5">
                <p class="text-uppercase text-primary fw-semibold small mb-2">Edit Review</p>
                <h1 class="mb-2">{{ gym.name }}</h1>
                <p class="text-secondary mb-4">Update your rating and comment.</p>

                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex flex-column flex-sm-row gap-3">
                        <button class="btn btn-primary" type="submit">Save Review</button>
                        <a class="btn btn-outline-secondary" href="{% url 'gym_detail' gym.slug %}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gym Hub UK{% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <style>
        :root {
            --gymxp-page-bg: linear-gradient(180deg, #f3f4f6 0%, #ffffff 50%, #e5e7eb 100%);
            --gymxp-foreground: #111827;
            --gymxp-muted: #4b5563;
            --gymxp-card-bg: rgba(255, 255, 255, 0.6);
            --gymxp-card-border: rgba(255, 255, 255, 0.4);
            --gymxp-card-shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
            --gymxp-card-shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.14);
            --gymxp-card-radius: 1.8rem;
            --gymxp-card-blur: blur(40px);
            --gymxp-title-gradient: linear-gradient(90deg, #000000, #374151, #6b7280);
            --gymxp-pill-bg: rgba(0, 0, 0, 0.88);
            --gymxp-pill-radius: 999px;
            --gymxp-transition: 0.3s ease;
        }

        body {
            background:
                linear-gradient(180deg, rgba(243, 244, 246, 0.92) 0%, rgba(255, 255, 255, 0.96) 48%, rgba(229, 231, 235, 0.94) 100%),
                url("{% static 'gyms/images/gymxp-hypertrophy-bg.jpg' %}") center top / cover fixed;
            color: var(--gymxp-foreground);
            min-height: 100vh;
        }

        .hero-card {
            background: #030712;
            color: #fff;
            border: 0;
            box-shadow: 0 1.5rem 4rem rgba(3, 7, 18, 0.28);
        }

        .home-hero {
            min-height: 520px;
            overflow: hidden;
            position: relative;
        }

        .home-hero video,
        .home-hero-fallback {
            height: 100%;
            inset: 0;
            object-fit: cover;
            position: absolute;
            width: 100%;
        }

        .home-hero::after {
            background: linear-gradient(90deg, rgba(3, 7, 18, 0.92) 0%, rgba(3, 7, 18, 0.72) 42%, rgba(3, 7, 18, 0.28) 100%);
            content: "";
            inset: 0;
            position: absolute;
        }

        .home-hero-content {
            position: relative;
            z-index: 1;
        }

        .gym-card {
            background: var(--gymxp-card-bg);
            border: 1px solid var(--gymxp-card-border);
            border-radius: var(--gymxp-card-radius);
            backdrop-filter: var(--gymxp-card-blur);
            box-shadow: var(--gymxp-card-shadow);
            overflow: hidden;
            transition: transform var(--gymxp-transition), box-shadow var(--gymxp-transition);
        }

        .gym-card-media {
            aspect-ratio: 16 / 7;
            background: #111827;
            overflow: hidden;
        }

        .gym-card-media img {
            height: 100%;
            object-fit: cover;
            width: 100%;
        }

        .gym-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: var(--gymxp-card-shadow-hover);
        }

        .gym-card .card-body {
            padding: 2rem;
        }

        .gym-card .text-secondary {
            color: var(--gymxp-muted) !important;
        }

        .gym-card .card-title a {
            color: var(--gymxp-foreground);
            font-weight: 800;
            text-decoration: none;
        }

        @supports ((-webkit-background-clip: text) or (background-clip: text)) {
            .gym-card .card-title a {
                background: var(--gymxp-title-gradient);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                -webkit-text-fill-color: transparent;
            }
        }

        .gym-card .price-pill {
            display: inline-flex;
            border-radius: var(--gymxp-pill-radius);
            background: var(--gymxp-pill-bg);
            color: #fff;
            padding: 0.35rem 0.8rem;
            font-size: 0.9rem;
        }

        .rating-stars {
            display: inline-flex;
            align-items: center;
            gap: 0.15rem;
        }

        .rating-star {
            color: #d1d5db;
            font-size: 1.15rem;
            line-height: 1;
        }

        .rating-star-filled {
            color: #f59e0b;
        }

        .rating-text {
            color: var(--gymxp-muted);
            font-size: 0.9rem;
            margin-left: 0.35rem;
        }

        .home-feature-card {
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid rgba(255, 255, 255, 0.62);
            border-radius: var(--gymxp-card-radius);
            box-shadow: var(--gymxp-card-shadow);
            overflow: hidden;
        }

        .home-feature-card img {
            aspect-ratio: 16 / 9;
            object-fit: cover;
            width: 100%;
        }

        @media (min-width: 576px) {
            .gym-card .card-body {
                padding: 2.5rem;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Gym Hub UK</a>
            <a class="btn btn-light" href="{% url 'add_gym' %}">Add Gym</a>
        </div>
    </nav>

    <main>
        <div class="container mt-5">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>

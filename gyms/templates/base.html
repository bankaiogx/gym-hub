<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gym Hub UK{% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <style>
        :root {
            --gymxp-page-bg: linear-gradient(180deg, #f3f4f6 0%, #ffffff 50%, #e5e7eb 100%);
            --gymxp-foreground: #111827;
            --gymxp-muted: #4b5563;
            --gymxp-card-bg: rgba(255, 255, 255, 0.6);
            --gymxp-card-border: rgba(255, 255, 255, 0.4);
            --gymxp-card-shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
            --gymxp-card-shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.14);
            --gymxp-card-radius: 1.8rem;
            --gymxp-card-blur: blur(40px);
            --gymxp-title-gradient: linear-gradient(90deg, #000000, #374151, #6b7280);
            --gymxp-pill-bg: rgba(0, 0, 0, 0.88);
            --gymxp-pill-radius: 999px;
            --gymxp-transition: 0.3s ease;
        }

        body {
            background: var(--gymxp-page-bg);
            color: var(--gymxp-foreground);
            min-height: 100vh;
        }

        .hero-card {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: #fff;
            border: 0;
            box-shadow: 0 1rem 2rem rgba(13, 110, 253, 0.18);
        }

        .gym-card {
            background: var(--gymxp-card-bg);
            border: 1px solid var(--gymxp-card-border);
            border-radius: var(--gymxp-card-radius);
            backdrop-filter: var(--gymxp-card-blur);
            box-shadow: var(--gymxp-card-shadow);
            overflow: hidden;
            transition: transform var(--gymxp-transition), box-shadow var(--gymxp-transition);
        }

        .gym-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: var(--gymxp-card-shadow-hover);
        }

        .gym-card .card-body {
            padding: 2rem;
        }

        .gym-card .text-secondary {
            color: var(--gymxp-muted) !important;
        }

        .gym-card .card-title a {
            color: var(--gymxp-foreground);
            font-weight: 800;
            text-decoration: none;
        }

        @supports ((-webkit-background-clip: text) or (background-clip: text)) {
            .gym-card .card-title a {
                background: var(--gymxp-title-gradient);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                -webkit-text-fill-color: transparent;
            }
        }

        .gym-card .price-pill {
            display: inline-flex;
            border-radius: var(--gymxp-pill-radius);
            background: var(--gymxp-pill-bg);
            color: #fff;
            padding: 0.35rem 0.8rem;
            font-size: 0.9rem;
        }

        @media (min-width: 576px) {
            .gym-card .card-body {
                padding: 2.5rem;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Gym Hub UK</a>
            <a class="btn btn-light" href="{% url 'add_gym' %}">Add Gym</a>
        </div>
    </nav>

    <main>
        <div class="container mt-5">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
